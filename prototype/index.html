// ---------- audio (simple synth) ----------
let actx=null;
function initAudio(){ if(!actx) actx=new (window.AudioContext||window.webkitAudioContext)(); }
function blip(freq=600,dur=0.12,type='sine',vol=0.2){
  if(!actx) return; const t=actx.currentTime;
  const o=actx.createOscillator(),g=actx.createGain();
  o.type=type;o.frequency.setValueAtTime(freq,t);
  o.frequency.exponentialRampToValueAtTime(freq*1.6,t+dur);
  g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  o.connect(g);g.connect(actx.destination);o.start(t);o.stop(t+dur);
}
function chord(){ blip(523,0.15,'triangle',0.18); setTimeout(()=>blip(659,0.15,'triangle',0.18),60); setTimeout(()=>blip(784,0.2,'triangle',0.2),120);}

}

// ---------- Puub-kun (billboard sprite) ----------
const pCanvas=document.createElement('canvas');pCanvas.width=256;pCanvas.height=300;
const pctx=pCanvas.getContext('2d');
let puubOpts={expr:'normal',body:'#9e3f2a',hand:'#f2c14e',cheek:'#ff9a8a'};
const TAU=Math.PI*2;
function renderPuub(){
  const x=pctx,o=puubOpts;x.clearRect(0,0,256,300);
  // body teardrop
  x.fillStyle=o.body;
  x.beginPath();x.arc(128,130,104,0,TAU);x.fill();
  x.beginPath();x.moveTo(60,150);x.quadraticCurveTo(20,250,120,250);x.quadraticCurveTo(70,210,70,165);x.closePath();x.fill();
  // cheek
  x.fillStyle=o.cheek;x.globalAlpha=0.8;x.beginPath();x.arc(70,160,16,0,TAU);x.fill();x.globalAlpha=1;
  // eye white
  x.fillStyle='#fff';x.beginPath();x.arc(150,120,52,0,TAU);x.fill();
  x.fillStyle='#111';x.strokeStyle='#111';x.lineCap='round';
  if(o.expr==='happy'){            // にっこり (∪)
    x.lineWidth=12;x.beginPath();x.arc(150,108,28,0.18*Math.PI,0.82*Math.PI);x.stroke();
  } else if(o.expr==='wink'){      // ウインク/とじめ (∩)
    x.lineWidth=12;x.beginPath();x.arc(150,134,26,1.15*Math.PI,1.85*Math.PI);x.stroke();
  } else if(o.expr==='surprised'){ // びっくり (小さめ瞳+大ハイライト)
    x.beginPath();x.arc(150,122,19,0,TAU);x.fill();
    x.fillStyle='#fff';x.beginPath();x.arc(140,112,8,0,TAU);x.fill();
  } else {                         // ふつう
    x.beginPath();x.arc(150,124,30,0,TAU);x.fill();
    x.fillStyle='#fff';x.beginPath();x.arc(138,112,12,0,TAU);x.fill();
    x.fillStyle='#111';x.beginPath();x.arc(144,114,9,0,TAU);x.fill();
    x.fillStyle='#fff';x.beginPath();x.arc(160,134,5,0,TAU);x.fill();
  }
  // thumbs-up hand
  x.fillStyle=o.hand;
  x.beginPath();x.ellipse(205,205,34,24,0.5,0,TAU);x.fill();
  x.fillRect(196,170,22,40);x.beginPath();x.arc(207,170,11,0,TAU);x.fill();
}
renderPuub();

el.addEventListener('pointerdown',e=>{initAudio();tch.down=true;tch.id=e.pointerId;tch.longFired=false;
  tch.x=tch.x0=e.clientX;tch.y=tch.y0=e.clientY;tch.t0=performance.now();tch.moved=false;
  clearTimeout(longTimer);
  longTimer=setTimeout(()=>{ if(tch.down&&!tch.moved){const ps=puubScreen();
    if(Math.hypot(tch.x-ps.x,tch.y-ps.y)<120){changeExpression();tch.longFired=true;} } },480);});
el.addEventListener('pointermove',e=>{if(!tch.down||e.pointerId!==tch.id)return;
  tch.x=e.clientX;tch.y=e.clientY;if(Math.hypot(tch.x-tch.x0,tch.y-tch.y0)>14){tch.moved=true;clearTimeout(longTimer);}});
function endTouch(e){if(!tch.down||e.pointerId!==tch.id)return;tch.down=false;clearTimeout(longTimer);
  if(tch.longFired){tch.longFired=false;return;}
  const dur=performance.now()-tch.t0;
  if(dur<240 && !tch.moved){ const now=performance.now();
    if(now-lastTap<320){ lastTap=0; if(pendingTap){clearTimeout(pendingTap);pendingTap=null;} doAction(); }
    else { lastTap=now; const tx=tch.x0,ty=tch.y0;
      pendingTap=setTimeout(()=>{pendingTap=null;const ps=puubScreen();
        if(Math.hypot(tx-ps.x,ty-ps.y)<95) bounce();},320); }
  }
}
el.addEventListener('pointerup',endTouch);el.addEventListener('pointercancel',endTouch);
function doAction(){ if(nearest) collect(nearest); else bounce(); }

// ---------- juice ----------
let puubCount=10;const puubEl=document.getElementById('puub');
function floatText(x3,y3,z3,txt,color){
  const v=new THREE.Vector3(x3,y3,z3).project(camera);
  const sx=(v.x*0.5+0.5)*innerWidth,sy=(-v.y*0.5+0.5)*innerHeight;
  const d=document.createElement('div');d.className='float';d.textContent=txt;d.style.color=color;
  d.style.left=sx+'px';d.style.top=sy+'px';document.body.appendChild(d);
  requestAnimationFrame(()=>{d.style.transform='translateY(-70px) scale(1.3)';d.style.opacity='0';});
  setTimeout(()=>d.remove(),1000);
}
const particles=[];
function burst(pos,color){
  for(let i=0;i<12;i++){
    const m=new THREE.Mesh(new THREE.IcosahedronGeometry(0.13,0),new THREE.MeshBasicMaterial({color}));
    m.position.copy(pos);
    const a=Math.random()*Math.PI*2,sp=2+Math.random()*3;
    m.userData={vx:Math.cos(a)*sp,vy:3+Math.random()*3,vz:Math.sin(a)*sp,life:0.7};
    scene.add(m);particles.push(m);
  }
}
function screenOf(v3,yoff=0){const v=new THREE.Vector3(v3.x,v3.y+yoff,v3.z).project(camera);
  return {x:(v.x*0.5+0.5)*innerWidth,y:(-v.y*0.5+0.5)*innerHeight};}
const bubbleEl=document.getElementById('bubble');
let bubbleTimer=null,bubbleTarget=null;
function say(o){initAudio();bubbleTarget=o.group.position;
  bubbleEl.style.display='block';bubbleEl.textContent=o.lines[o.line%o.lines.length];o.line++;
  const ps=screenOf(o.group.position,2.0);bubbleEl.style.left=ps.x+'px';bubbleEl.style.top=ps.y+'px';
  if(o.kind==='npc')o.hopT=0.4;
  blip(520,0.08,'sine',0.16);setTimeout(()=>blip(660,0.09,'sine',0.14),60);
  clearTimeout(bubbleTimer);bubbleTimer=setTimeout(()=>{bubbleEl.style.display='none';bubbleTarget=null;},2800);}
let celebrate=0,hop=0;
function bounce(){ initAudio(); hop=0.55; blip(680,0.1,'sine',0.2); setTimeout(()=>blip(940,0.12,'sine',0.16),70); }
function collect(o){
  if(o.kind==='npc'||o.kind==='sign'){ say(o); return; }
  if(!o.alive && o.kind!=='cat')return;
  initAudio();
  const p=o.group.position.clone();p.y=1.2;
  if(o.kind==='cat'){
    blip(880,0.1,'sine',0.18);setTimeout(()=>blip(660,0.18,'sine',0.16),80);
    burst(p,0xff7ab0);floatText(p.x,2.2,p.z,'❤️ なでなで',' #ff5a8a');
    celebrate=0.5;return;
  }
  o.alive=false;o.group.visible=false;
  const gain=5;puubCount+=gain;puubEl.textContent=puubCount;
  chord();burst(p, o.kind==='flower'?0xff5aa0:o.kind==='gift'?0x6fd0ff:0xffd24a);
  floatText(p.x,2.2,p.z,'+'+gain+' プーブ 👍','#ffba2e');
  puubEl.parentElement.animate([{transform:'scale(1.25)'},{transform:'scale(1)'}],{duration:300});
  celebrate=0.6;
  // respawn after a bit
  setTimeout(()=>{o.alive=true;o.group.visible=true;
    o.group.scale.set(0.01,0.01,0.01);},2600);
}

// ---------- camera ----------
camera.position.copy(puub.position).add(camOff);camera.lookAt(puub.position);

// ---------- loop ----------
let t=0,last=performance.now(),walkPhase=0,facing=1,dustT=0,fountT=0;
function loop(now){
  const dt=Math.min((now-last)/1000,0.05);last=now;t+=dt;
  // input dir：指を置いた方向（ぷーぶ君が中心・遠いほど速い）
  let ix=0,iz=0;
  if(tch.down && !tch.longFired){const ps=puubScreen();let dx=tch.x-ps.x,dy=tch.y-ps.y;const d=Math.hypot(dx,dy);
    if(d>50){const mag=Math.min(1,(d-50)/200);ix=dx/d*mag;iz=dy/d*mag;}}  // 中心付近は“あそび”で誤作動防止
  if(keys['arrowleft']||keys['a'])ix-=1; if(keys['arrowright']||keys['d'])ix+=1;
  if(keys['arrowup']||keys['w'])iz-=1; if(keys['arrowdown']||keys['s'])iz+=1;
  const len=Math.hypot(ix,iz);const moving=len>0.06;
  if(moving){const nx=ix/len,nz=iz/len;const sp=6.8*Math.min(1,len);
    puub.position.x+=nx*sp*dt;puub.position.z+=nz*sp*dt;
    const rr=Math.hypot(puub.position.x,puub.position.z);if(rr>34){puub.position.x*=34/rr;puub.position.z*=34/rr;}
    for(const b of blockers){const bx=puub.position.x-b.x,bz=puub.position.z-b.z;const bd=Math.hypot(bx,bz);
      if(bd<b.r&&bd>0.0001){puub.position.x=b.x+bx/bd*b.r;puub.position.z=b.z+bz/bd*b.r;}}
    walkPhase+=dt*14; puubMat.rotation=Math.sin(walkPhase)*0.05;
    if(nx<-0.01) facing=-1; else if(nx>0.01) facing=1;
    dustT-=dt;if(dustT<=0){dustT=0.17;const m=new THREE.Mesh(new THREE.IcosahedronGeometry(0.1,0),new THREE.MeshBasicMaterial({color:0xe6cf9a}));
      m.position.set(puub.position.x,0.15,puub.position.z);m.userData={vx:(Math.random()-0.5),vy:1+Math.random(),vz:(Math.random()-0.5),life:0.4};scene.add(m);particles.push(m);}
  } else { walkPhase*=0.9; puubMat.rotation*=0.8; }
  // squash & stretch + bob
  const bob=moving?Math.abs(Math.sin(walkPhase))*0.18:Math.sin(t*2)*0.04;
  let sx=1+Math.sin(walkPhase*1)*0.06, sy=1-Math.sin(walkPhase*1)*0.06;
  if(celebrate>0){celebrate-=dt; const c=Math.sin((0.6-celebrate)*12); sy+=0.18*Math.max(0,c); sx-=0.1*Math.max(0,c);}
  let jump=0;
  if(hop>0){hop-=dt; const k=Math.sin(Math.max(0,(0.55-hop))/0.55*Math.PI); jump=k*0.75; sx-=0.16*k; sy+=0.22*k;}
  puubTex.repeat.x=facing; puubTex.offset.x=facing<0?1:0;   // 左右反転（向き）
  puub.scale.set(2.6*sx,3.05*sy,1);
  puub.position.y=1.55+bob+jump;
  blob.position.set(puub.position.x,0.02,puub.position.z);
  const bs=moving?1+Math.sin(walkPhase)*0.06:1; blob.scale.set(bs,bs,bs);

  // items idle anim + nearest highlight
  let best=null,bestd=4.5;
  for(const o of items){ if(!o.alive)continue;
    if(o.spin){o.mesh.rotation.y+=dt*1.5;o.mesh.position.y=1+Math.sin(t*3+o.group.position.x)*0.12;
      if(o.group.scale.x<1){const s2=Math.min(1,o.group.scale.x+dt*3);o.group.scale.set(s2,s2,s2);}
      const d2=Math.hypot(puub.position.x-o.group.position.x,puub.position.z-o.group.position.z);
      o.mesh.scale.setScalar(1+(d2<4.5?Math.sin(t*8)*0.12:0));
    } else if(o.kind==='npc'){let hy=0;if(o.hopT>0){o.hopT-=dt;hy=Math.sin(Math.max(0,(0.4-o.hopT))/0.4*Math.PI)*0.4;}
      o.group.position.y=1.3+Math.sin(t*2+o.group.position.x)*0.05+hy;}
    const d=Math.hypot(puub.position.x-o.group.position.x,puub.position.z-o.group.position.z);
    if(d<bestd){bestd=d;best=o;}
  }
  // sway / clouds / butterflies / bubble follow
  for(const f of sway)f.rotation.z=Math.sin(t*2+f.position.x)*0.14;
  for(const c of clouds){c.position.x+=dt*0.5;if(c.position.x>36)c.position.x=-36;}
  for(const b of bflies){const u=b.userData;u.a+=dt*1.2;b.position.set(u.cx+Math.cos(u.a)*u.r,1.3+Math.sin(u.a*2)*0.3,u.cz+Math.sin(u.a)*u.r);}
  if(bubbleTarget){const ps=screenOf(bubbleTarget,2.0);bubbleEl.style.left=ps.x+'px';bubbleEl.style.top=ps.y+'px';}
  // fountain droplets
  fountT-=dt;if(fountT<=0){fountT=0.05;const m=new THREE.Mesh(new THREE.IcosahedronGeometry(0.08,0),dropMat);
    m.position.set(0,2.0,0);const a=Math.random()*7;m.userData={vx:Math.cos(a)*1.2,vy:3.2+Math.random(),vz:Math.sin(a)*1.2,life:0.9};scene.add(m);particles.push(m);}
  // cat idle
  cat.position.y=Math.sin(t*2)*0.03; catHead.rotation.z=Math.sin(t*1.5)*0.08;
  nearest=best;
  if(best){promptEl.style.display='block';
    promptEl.textContent = best.kind==='cat'?'😺 ダブルタップで なでる' : best.kind==='npc'?'💬 ダブルタップで はなす' : best.kind==='sign'?'📖 ダブルタップで よむ' : '✨ ダブルタップで つかう';}
  else promptEl.style.display='none';

  // particles
  for(let i=particles.length-1;i>=0;i--){const m=particles[i],u=m.userData;
    u.life-=dt;if(u.life<=0){scene.remove(m);particles.splice(i,1);continue;}
    u.vy-=12*dt;m.position.x+=u.vx*dt;m.position.y+=u.vy*dt;m.position.z+=u.vz*dt;
    m.scale.setScalar(Math.max(0.01,u.life));}

  // camera follow
  const target=puub.position.clone().add(camOff);
  camera.position.lerp(target,1-Math.pow(0.001,dt));
  camera.lookAt(puub.position.x,1.2,puub.position.z);

  renderer.render(scene,camera);requestAnimationFrame(loop);
}

addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
document.getElementById('go').addEventListener('click',()=>{
  initAudio();blip(660,0.12,'triangle',0.2);
  document.getElementById('start').style.display='none';
});
requestAnimationFrame(loop);
</script>
</body>
