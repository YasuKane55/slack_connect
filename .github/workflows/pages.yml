name: Deploy prototype to GitHub Pages

on:
  push:
    branches: ["claude/pubu-game-prototype-q53h9n"]
    paths: ["prototype/**", ".github/workflows/pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Pages (auto-enable)
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload prototype
        uses: actions/upload-pages-artifact@v3
        with:
          path: prototype
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
